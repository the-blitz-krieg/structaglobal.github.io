<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" width="240" height="80">
  <defs>
    <style>
      .logo-text { font-family: 'Barlow Condensed', 'Arial Narrow', sans-serif; }
    </style>
  </defs>
  <!-- Logomark: architectural bracket symbol -->
  <g transform="translate(0, 6)">
    <!-- Left vertical bar -->
    <rect x="4" y="4" width="2.5" height="28" fill="#b8902a"/>
    <!-- Top horizontal -->
    <rect x="4" y="4" width="10" height="2.5" fill="#b8902a"/>
    <!-- Bottom horizontal -->
    <rect x="4" y="29.5" width="10" height="2.5" fill="#b8902a"/>
    <!-- Mid accent line -->
    <rect x="4" y="15" width="6" height="1.5" fill="#b8902a" opacity="0.6"/>
  </g>
  <!-- STRUCTA text -->
  <text x="24" y="26" font-family="'Barlow Condensed','Arial Narrow',sans-serif"
        font-size="15" font-weight="700" letter-spacing="3" fill="#faf9f6">STRUCTA</text>
  <!-- Gold dot separator -->
  <circle cx="112" cy="22" r="2" fill="#b8902a"/>
  <!-- GLOBAL text -->
  <text x="116" y="26" font-family="'Barlow Condensed','Arial Narrow',sans-serif"
        font-size="15" font-weight="700" letter-spacing="3" fill="#b8902a">GLOBAL</text>
  <!-- Tagline -->
  <text x="24" y="34" font-family="'Barlow Condensed','Arial Narrow',sans-serif"
        font-size="5.5" letter-spacing="2.5" fill="#b8902a" opacity="0.7">ENGINEERED TRUST. DELIVERED.</text>
</svg>
