<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#b8902a" stroke-width="0.4" opacity="0.12"/>
    </pattern>
    <linearGradient id="goldFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b8902a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#b8902a" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Left gold bar -->
  <rect x="0" y="0" width="6" height="630" fill="#b8902a"/>
  <!-- Bottom gold line -->
  <rect x="0" y="600" width="800" height="2" fill="url(#goldFade)"/>
  <!-- Architectural line drawing - right side -->
  <g transform="translate(760, 60)" opacity="0.18">
    <rect x="60" y="20" width="280" height="490" stroke="#b8902a" stroke-width="1.5" fill="none"/>
    <line x1="60" y1="80" x2="340" y2="80" stroke="#b8902a" stroke-width="0.8"/>
    <line x1="60" y1="140" x2="340" y2="140" stroke="#b8902a" stroke-width="0.8"/>
    <line x1="60" y1="200" x2="340" y2="200" stroke="#b8902a" stroke-width="0.8"/>
    <line x1="60" y1="260" x2="340" y2="260" stroke="#b8902a" stroke-width="0.8"/>
    <line x1="60" y1="320" x2="340" y2="320" stroke="#b8902a" stroke-width="0.8"/>
    <line x1="60" y1="380" x2="340" y2="380" stroke="#b8902a" stroke-width="0.8"/>
    <line x1="60" y1="440" x2="340" y2="440" stroke="#b8902a" stroke-width="0.8"/>
    <line x1="130" y1="20" x2="130" y2="510" stroke="#b8902a" stroke-width="0.8"/>
    <line x1="200" y1="20" x2="200" y2="510" stroke="#b8902a" stroke-width="0.8"/>
    <line x1="270" y1="20" x2="270" y2="510" stroke="#b8902a" stroke-width="0.8"/>
    <rect x="100" y="0" width="200" height="20" stroke="#b8902a" stroke-width="1.5" fill="none"/>
    <polygon points="200,-30 240,0 160,0" stroke="#b8902a" stroke-width="1.5" fill="none"/>
  </g>
  <!-- Logo bracket mark -->
  <rect x="80" y="200" width="5" height="80" fill="#b8902a"/>
  <rect x="80" y="200" width="24" height="5" fill="#b8902a"/>
  <rect x="80" y="275" width="24" height="5" fill="#b8902a"/>
  <rect x="80" y="235" width="14" height="3" fill="#b8902a" opacity="0.6"/>
  <!-- STRUCTA.GLOBAL wordmark -->
  <text x="120" y="256"
        font-family="'Barlow Condensed','Arial Narrow',Arial,sans-serif"
        font-size="52" font-weight="700" letter-spacing="8" fill="#faf9f6">STRUCTA</text>
  <circle cx="458" cy="248" r="5" fill="#b8902a"/>
  <text x="474" y="256"
        font-family="'Barlow Condensed','Arial Narrow',Arial,sans-serif"
        font-size="52" font-weight="700" letter-spacing="8" fill="#b8902a">GLOBAL</text>
  <!-- Tagline -->
  <text x="120" y="296"
        font-family="'Barlow Condensed','Arial Narrow',Arial,sans-serif"
        font-size="16" letter-spacing="5" fill="#b8902a" opacity="0.7">ENGINEERED TRUST. DELIVERED.</text>
  <!-- Description -->
  <text x="120" y="360"
        font-family="'Barlow Condensed','Arial Narrow',Arial,sans-serif"
        font-size="20" letter-spacing="1.5" fill="#f0ede6" opacity="0.55">Architectural Building Materials Supplier</text>
  <text x="120" y="390"
        font-family="'Barlow Condensed','Arial Narrow',Arial,sans-serif"
        font-size="20" letter-spacing="1.5" fill="#f0ede6" opacity="0.55">Kochi · Trivandrum · Thrissur · Kozhikode · Kottayam</text>
  <!-- Cert badges row -->
  <g transform="translate(120, 430)">
    <rect x="0" y="0" width="72" height="24" fill="none" stroke="#b8902a" stroke-width="1" opacity="0.5"/>
    <text x="36" y="16" font-family="'Barlow Condensed','Arial Narrow',Arial,sans-serif" font-size="10" font-weight="700" letter-spacing="1.5" fill="#b8902a" text-anchor="middle">ISO 9001</text>
    <rect x="80" y="0" width="44" height="24" fill="none" stroke="#b8902a" stroke-width="1" opacity="0.5"/>
    <text x="102" y="16" font-family="'Barlow Condensed','Arial Narrow',Arial,sans-serif" font-size="10" font-weight="700" letter-spacing="1.5" fill="#b8902a" text-anchor="middle">CE</text>
    <rect x="132" y="0" width="44" height="24" fill="none" stroke="#b8902a" stroke-width="1" opacity="0.5"/>
    <text x="154" y="16" font-family="'Barlow Condensed','Arial Narrow',Arial,sans-serif" font-size="10" font-weight="700" letter-spacing="1.5" fill="#b8902a" text-anchor="middle">BIS</text>
    <rect x="184" y="0" width="52" height="24" fill="none" stroke="#b8902a" stroke-width="1" opacity="0.5"/>
    <text x="210" y="16" font-family="'Barlow Condensed','Arial Narrow',Arial,sans-serif" font-size="10" font-weight="700" letter-spacing="1.5" fill="#b8902a" text-anchor="middle">IGBC</text>
    <rect x="244" y="0" width="52" height="24" fill="none" stroke="#b8902a" stroke-width="1" opacity="0.5"/>
    <text x="270" y="16" font-family="'Barlow Condensed','Arial Narrow',Arial,sans-serif" font-size="10" font-weight="700" letter-spacing="1.5" fill="#b8902a" text-anchor="middle">LEED</text>
  </g>
  <!-- URL -->
  <text x="120" y="560"
        font-family="'Barlow Condensed','Arial Narrow',Arial,sans-serif"
        font-size="16" letter-spacing="2" fill="#b8902a" opacity="0.5">www.structaglobal.com</text>
</svg>
